name: PubMed Weekly Digest

on:
  schedule:
    - cron: "30 13 * * 1"   # Every Monday at 8:30 AM Houston (CDT = UTC-5)
                              # In winter (Nov-Mar), change to "30 14 * * 1" for CST (UTC-6)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run digest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/fetch_and_digest.py

      - name: Commit and push dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "digest: $(date +'%Y-%m-%d')"
          git push
